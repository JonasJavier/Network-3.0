# Full production-like stack: PostgreSQL + Redis + Django API + React frontend.
#
#   docker compose up --build
#
# Frontend: http://localhost:8080  ·  API: http://localhost:8000
# Optional: seed demo data with
#   docker compose exec api python manage.py seed

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: network
      POSTGRES_USER: network
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-network}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U network -d network"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-compose-key-change-me}
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,api
      # No TLS terminator in this local stack:
      DJANGO_SECURE_SSL_REDIRECT: "0"
      DATABASE_URL: postgres://network:${POSTGRES_PASSWORD:-network}@db:5432/network
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    ports:
      - "8000:8000"
    volumes:
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
  media:
