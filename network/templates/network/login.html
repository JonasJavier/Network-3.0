
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>{% block title %}Social Network{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <link href="{% static 'network/css/login.css' %}" rel="stylesheet">
</head>
<body>
<main>
<div class="container">
    <div class="row justify-content-center align-items-center" style="height:100vh;">
        <div class="col-6">
            <div class="card">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <img class="logo" src="{% static 'network/photos/logo.png' %}" alt="Logo">
                        <h3>Welcome Back!</h3>
                        <p>Please login to your account.</p>
                    </div>
                    {% if message %}
                        <div class="alert alert-warning" role="alert">{{ message }}</div>
                    {% endif %}
                    <form action="{% url 'login' %}" method="post">
                        {% csrf_token %}
                        <div class="form-group">
                            <input autofocus class="form-control" type="text" name="username" placeholder="Username">
                        </div>
                        <div class="form-group">
                            <input class="form-control" type="password" name="password" placeholder="Password">
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Login</button>
                    </form>
                    <div class="mt-3">
                        <p class="p2">Don't have an account? <a class="register" href="{% url 'register' %}" style="color: #1a73e8;">Register here.</a></p>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>
</div>
</main>
</body>
</html>
