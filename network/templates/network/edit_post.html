{% extends "network/layout.html" %}

{% block body %}
<div class="container mt-4">
    <h2>Editar Post</h2>
    <form action="{% url 'edit_post' post.id %}" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Guardar cambios</button>
    </form>
</div>
{% endblock %}
